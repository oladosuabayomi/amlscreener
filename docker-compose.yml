version: "3.9"

services:
  frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build: ./aml-screener-backend
    ports:
      - "8000:8000"
    env_file:
      - ./aml-screener-backend/.env
